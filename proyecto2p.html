<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla de Animales</title>

<style>
body {
  background-color: #ffe4ec;
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  color: #c2185b;
}

table {
  border-collapse: collapse;
  width: 80%;
  margin: auto;
  background-color: #fff0f5;
}

th {
  background-color: #ff69b4;
  color: white;
  padding: 12px;
}

td {
  border: 1px solid #ffb6c1;
  padding: 12px;
  text-align: center;
}

tr:nth-child(even) {
  background-color: #ffe4e1;
}

tr:hover {
  background-color: #ffc0cb;
}

img {
  border-radius: 10px;
  width: 150px;
  height: 150px;
  object-fit: cover;
}
</style>
</head>

<body>

<h1> Tabla de Animales </h1>

<table>
<tr>
<th>ANIMAL</th>
<th>DESCRIPCIÓN</th>
<th>IMAGEN</th>
</tr>

<tr>
<td>León</td>
<td>El rey de la selva, un gran felino carnívoro.</td>
<td><img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d"></td>
</tr>

<tr>
<td>Delfín</td>
<td>Mamífero marino muy inteligente y amigable.</td>
<td><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"></td>
</tr>

<tr>
<td>Águila</td>
<td>Ave rapaz con gran vista y poderosa.</td>
<td><img src="https://images.unsplash.com/photo-1501706362039-c6e13f6f6f92"></td>
</tr>

<tr>
<td>Gato</td>
<td>Animal doméstico ágil e independiente.</td>
<td><img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131"></td>
</tr>

<tr>
<td>Tortuga</td>
<td>Reptil de movimiento lento con caparazón.</td>
<td><img src="https://images.unsplash.com/photo-1505678261036-a3fcc5e884ee"></td>
</tr>

</table>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de Animales</title>

<style>
body {
  background: linear-gradient(to right, #ffe4ec, #ffd6e7);
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  color: #d63384;
}

table {
  border-collapse: collapse;
  width: 85%;
  margin: 30px auto;
  background-color: #fff0f5;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 15px;
  text-align: center;
}

th {
  background-color: #ffb6c1;
  color: white;
}

tr:nth-child(even) {
  background-color: #ffe4e1;
}

tr:hover {
  background-color: #ffc0cb;
  transition: 0.3s;
}

img {
  border-radius: 12px;
  width: 180px;
  height: 180px;
  object-fit: cover;
}
</style>
</head>

<body>

<h1>🌸 Tabla de 5 Animales 🌸</h1>

<table>
<tr>
<th>ANIMAL</th>
<th>DESCRIPCIÓN</th>
<th>IMAGEN</th>
</tr>

<tr>
<td>Pingüino</td>
<td>Ave marina que no vuela y vive en zonas frías.</td>
<td><img src="https://images.unsplash.com/photo-1544642899-f0d6e5f6ed6f"></td>
</tr>

<tr>
<td>Elefante</td>
<td>El mamífero terrestre más grande del mundo.</td>
<td><img src="https://images.unsplash.com/photo-1557053964-937650b63311"></td>
</tr>

<tr>
<td>Flamenco</td>
<td>Ave rosada que vive en lagunas.</td>
<td><img src="https://images.unsplash.com/photo-1520975922203-bb3b5f6b4c9d"></td>
</tr>

<tr>
<td>Perro</td>
<td>Animal doméstico fiel y amigable.</td>
<td><img src="https://images.unsplash.com/photo-1517849845537-4d257902454a"></td>
</tr>

<tr>
<td>Jirafa</td>
<td>El animal más alto del mundo.</td>
<td><img src="https://images.unsplash.com/photo-1547721064-da6cfb341d50"></td>
</tr>

</table>

</body>
</html>

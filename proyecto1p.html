<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tabla de Animales</title>

<style>
body {
  background-color: #ffe4ec; /* fondo rosa suave */
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  color: #c2185b;
}

table {
  border-collapse: collapse;
  width: 80%;
  margin: auto;
  background-color: #fff0f5; /* rosa muy claro */
}

th {
  background-color: #ff69b4; /* rosa fuerte */
  color: white;
  padding: 10px;
}

td {
  border: 1px solid #ffb6c1;
  padding: 10px;
  text-align: center;
}

tr:nth-child(even) {
  background-color: #ffe4e1; /* rosa alterno */
}

img {
  border-radius: 10px;
  width: 150px;
  height: 150px;
}
</style>
</head>

<body>

<h1>🌸 Tabla de Animales 🌸</h1>

<table>
<tr>
<th>ANIMAL</th>
<th>DESCRIPCIÓN</th>
<th>IMAGEN</th>
</tr>

<tr>
<td>Pingüino</td>
<td>Ave que vive en el frío y no vuela.</td>
<td><img src="https://images.unsplash.com/photo-1544642899-f0d6e5f6ed6f"></td>
</tr>

<tr>
<td>Elefante</td>
<td>El animal terrestre más grande.</td>
<td><img src="https://images.unsplash.com/photo-1557053964-937650b63311"></td>
</tr>

<tr>
<td>Flamenco</td>
<td>Ave rosada que vive en lagunas.</td>
<td><img src="https://images.unsplash.com/photo-1520975922203-bb3b5f6b4c9d"></td>
</tr>

<tr>
<td>Perro</td>
<td>Animal doméstico muy fiel.</td>
<td><img src="https://images.unsplash.com/photo-1517849845537-4d257902454a"></td>
</tr>

<tr>
<td>Jirafa</td>
<td>El animal más alto del mundo.</td>
<td><img src="https://images.unsplash.com/photo-1547721064-da6cfb341d50"></td>
</tr>

</table>

</body>
</html>
